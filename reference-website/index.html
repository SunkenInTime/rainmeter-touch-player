<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Audio Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/mono.css">
    <style>
        body {
            background-color: #f3f3f3;
            font-family: 'Geist Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .device-container {
            width: 320px;
            max-width: 100%;
            background-color: #1a1a1a;
            border-radius: 48px;
            padding: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid #000;
        }

        .screen-area {
            width: 100%;
            height: 180px;
            background: #000;
            border-radius: 36px 36px 4px 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Geist-style Pixel Grid Overlay */
        .screen-area::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 8px 8px;
            pointer-events: none;
            z-index: 5;
        }

        .screen-visual {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Using the requested background image */
            background: linear-gradient(rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.7) 100%),
                url('https://i.scdn.co/image/ab67616d0000b2731304f166cb145c7b448fda7e');
            background-size: cover;
            background-position: center;
            z-index: 1;
            opacity: 0.9;
        }

        .screen-visual.playing {
            animation: none;
        }

        .overlay-top {
            position: relative;
            z-index: 10;
            padding: 14px 12px;
            display: flex;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .overlay-bottom {
            position: relative;
            z-index: 10;
            padding: 10px 12px 14px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 12px;
            letter-spacing: -0.01em;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            background: #ff3b30;
            border-radius: 50%;
            display: none;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 10px #ff3b30;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.9);
            }
        }

        .grille {
            height: 24px;
            width: 100%;
            background-image: radial-gradient(#000 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.6;
            margin-top: 4px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            margin-top: 4px;
        }

        .btn {
            background: #1a1a1a;
            height: 80px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid #0a0a0a;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.05);
        }

        .btn:active {
            background: #141414;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .btn:active .icon {
            transform: scale(0.95);
            opacity: 0.7;
        }

        .btn-left {
            border-radius: 8px 8px 8px 36px;
        }

        .btn-right {
            border-radius: 8px 8px 36px 8px;
        }

        .icon {
            fill: #fff;
            width: 28px;
            height: 28px;
            opacity: 0.8;
            border-radius: 6px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .song-title {
            white-space: nowrap;
            overflow: hidden;
            max-width: 240px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.25);
            padding: 5px 16px;
            border-radius: 100px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            display: block;
        }

        .song-title .text {
            display: inline-block;
            white-space: nowrap;
            width: max-content;
        }

        .song-title .text.scrolling {
            animation: scroll-left var(--scroll-duration, 20s) linear infinite;
        }

        @keyframes scroll-left {
            0% {
                transform: translateX(0);
            }

            7.5% {
                transform: translateX(0);
            }

            98% {
                transform: translateX(-120%);
            }

            100% {
                transform: translateX(-120%);
            }
        }

        .song-title:hover .text.scrolling {
            animation-play-state: paused;
        }

        .song-title:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.35);
        }

        #fileInput {
            display: none;
        }

        .seek-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            z-index: 20;
        }

        #seek-progress {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.1s linear;
        }
    </style>
</head>

<body>

    <input type="file" id="fileInput" accept="audio/*">
    <audio id="audioElement"></audio>

    <div class="device-container">
        <div class="screen-area">
            <div id="visual" class="screen-visual"></div>

            <div class="overlay-top">
                <div class="song-title" id="uploadTrigger" title="Click to upload audio">
                    <span class="text">IMPORT AUDIO</span>
                </div>
            </div>

            <div class="overlay-bottom">
                <div id="time-display" class="w-16 tabular-nums">00:00</div>

                <div class="status-container">
                    <span id="dot" class="status-dot"></span>
                    <span id="status-label">Standby</span>
                </div>

                <div id="clock" class="w-16 text-right tabular-nums">03:52 AM</div>
            </div>

            <div class="seek-container" id="seekContainer">
                <div id="seek-progress"></div>
            </div>
        </div>

        <div class="grille"></div>

        <div class="controls-grid">
            <div class="btn btn-left" id="prev" title="Rewind 5s">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M6 6h2v12H6zm3.5 6L18 18V6z"></path>
                </svg>
            </div>
            <div class="btn" id="playToggle">
                <svg id="playIcon" class="icon" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"></path>
                </svg>
                <svg id="pauseIcon" class="icon hidden" viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
                </svg>
            </div>
            <div class="btn btn-right" id="next" title="Forward 5s">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"></path>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadTrigger = document.getElementById('uploadTrigger');
        const audio = document.getElementById('audioElement');

        const playToggle = document.getElementById('playToggle');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const visual = document.getElementById('visual');
        const dot = document.getElementById('dot');
        const statusLabel = document.getElementById('status-label');
        const clock = document.getElementById('clock');
        const timeDisplay = document.getElementById('time-display');
        const seekProgress = document.getElementById('seek-progress');
        const seekContainer = document.getElementById('seekContainer');

        uploadTrigger.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audio.src = url;
                const textEl = uploadTrigger.querySelector('.text');
                textEl.textContent = file.name.toUpperCase();

                const container = uploadTrigger;
                if (textEl.offsetWidth > container.offsetWidth) {
                    const textWidth = textEl.offsetWidth;
                    const containerWidth = container.offsetWidth;
                    const pixelsToScroll = textWidth;
                    const pixelsPerSecond = 30;
                    const duration = (pixelsToScroll / pixelsPerSecond) + 3;
                    textEl.style.setProperty('--scroll-duration', `${duration}s`);
                    textEl.classList.add('scrolling');
                } else {
                    textEl.classList.remove('scrolling');
                }

                statusLabel.innerText = "Ready";
                isPlaying = false;
                updateUI();
            }
        });

        let isPlaying = false;
        playToggle.addEventListener('click', () => {
            if (!audio.src) return;

            if (audio.paused) {
                audio.play();
                isPlaying = true;
            } else {
                audio.pause();
                isPlaying = false;
            }
            updateUI();
        });

        function updateUI() {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                visual.classList.add('playing');
                dot.style.display = 'inline-block';
                statusLabel.innerText = "Playing";
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                visual.classList.remove('playing');
                dot.style.display = 'none';
                statusLabel.innerText = audio.src ? "Paused" : "Standby";
            }
        }

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            seekProgress.style.width = `${percent}%`;

            const remaining = Math.max(0, audio.duration - audio.currentTime);
            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `${mins}:${secs}`;
        });

        seekContainer.addEventListener('click', (e) => {
            if (!audio.src) return;
            const rect = seekContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        });

        document.getElementById('prev').addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 5);
        });

        document.getElementById('next').addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
        });

        audio.addEventListener('ended', () => {
            isPlaying = false;
            updateUI();
        });

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            clock.innerText = `${hours.toString().padStart(2, '0')}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>

</html>
