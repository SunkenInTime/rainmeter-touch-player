[Rainmeter]
Update=150
AccurateText=1
DynamicWindowSize=1
MiddleMouseUpAction=[!Refresh]

[Metadata]
Author=OpenAI Codex
Name=RetroTouchPlayer
Information=Retro-styled Rainmeter music player inspired by the supplied website design.
Version=1.0.0
License=Personal use

[Variables]
@Include=#@#Variables.inc

[TitleMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Title
UpdateDivider=1
RegExpSubstitute=1
Substitute="[\r\n]+":" "

[ArtistMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Artist
UpdateDivider=1

[CoverMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Cover
UpdateDivider=1

[StateMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=State
UpdateDivider=1

[PlayingPulseAlpha]
Measure=Calc
Formula=Clamp(128 + 127*Sin(Counter*0.35), 70, 255)
DynamicVariables=1
Disabled=([StateMeasure]<>1)
OnUpdateAction=[!SetVariable PlayingDotAlpha "[PlayingPulseAlpha]"][!UpdateMeter StatusPlayingIcon][!Redraw]

[StatusMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Status
UpdateDivider=1

[PositionMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Position
UpdateDivider=1

[DurationMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Duration
UpdateDivider=1

[ProgressMeasure]
Measure=Plugin
Plugin=#PlayerPlugin#
PlayerName=#PlayerName#
PlayerType=Progress
UpdateDivider=1

[ClockMeasure]
Measure=Time
Format=%I:%M %p

[ShellBody]
Meter=Shape
Shape=Rectangle 0,0,#ShellWidth#,#ShellHeight#,#ShellRadius#,#ShellRadius# | Fill Color #ShellColor# | StrokeWidth 1 | Stroke Color #ShellStroke#
Shape2=Rectangle 1,1,(#ShellWidth#-2),(#ShellHeight#-2),(#ShellRadius#-2),(#ShellRadius#-2) | Fill Color 0,0,0,0 | StrokeWidth 1 | Stroke Color #ShellHighlight#
DynamicVariables=1
LeftMouseDoubleClickAction=[!CommandMeasure TitleMeasure "OpenPlayer"]

[ScreenFrame]
Meter=Shape
X=#ScreenX#
Y=#ScreenY#
Shape=Path ScreenOuter | Fill Color #ScreenFrameColor# | StrokeWidth 1 | Stroke Color #ScreenStroke#
Shape2=Path ScreenInner | Fill Color 0,0,0,0 | StrokeWidth 1 | Stroke Color #ScreenHighlight#
ScreenOuter=36,0 | LineTo (#ScreenWidth#-36),0 | ArcTo #ScreenWidth#,36,36,36 | LineTo #ScreenWidth#,(#ScreenHeight#-4) | ArcTo (#ScreenWidth#-4),#ScreenHeight#,4,4 | LineTo 4,#ScreenHeight# | ArcTo 0,(#ScreenHeight#-4),4,4 | LineTo 0,36 | ArcTo 36,0,36,36 | ClosePath 1
ScreenInner=38,2 | LineTo (#ScreenWidth#-38),2 | ArcTo (#ScreenWidth#-2),38,34,34 | LineTo (#ScreenWidth#-2),(#ScreenHeight#-4) | ArcTo (#ScreenWidth#-4),(#ScreenHeight#-2),2,2 | LineTo 6,(#ScreenHeight#-2) | ArcTo 2,(#ScreenHeight#-4),2,2 | LineTo 2,38 | ArcTo 38,2,34,34 | ClosePath 1
DynamicVariables=1

[ScreenMask]
Meter=Shape
X=#ScreenX#
Y=#ScreenY#
Shape=Path ScreenClip | Fill Color #ScreenFallback# | StrokeWidth 0
ScreenClip=36,0 | LineTo (#ScreenWidth#-36),0 | ArcTo #ScreenWidth#,36,36,36 | LineTo #ScreenWidth#,(#ScreenHeight#-4) | ArcTo (#ScreenWidth#-4),#ScreenHeight#,4,4 | LineTo 4,#ScreenHeight# | ArcTo 0,(#ScreenHeight#-4),4,4 | LineTo 0,36 | ArcTo 36,0,36,36 | ClosePath 1
DynamicVariables=1

[StandbyBackdrop]
Meter=Shape
Container=ScreenMask
X=0
Y=0
Shape=Rectangle 0,0,#ScreenWidth#,#ScreenHeight# | Fill Color #ScreenFallback# | StrokeWidth 0
DynamicVariables=1

[CoverMeter]
Meter=Image
ImageName=[CoverMeasure]
Container=ScreenMask
X=0
Y=0
W=#ScreenWidth#
H=#ScreenHeight#
PreserveAspectRatio=2
ImageAlpha=230
DynamicVariables=1

[ScreenTint]
Meter=Shape
Container=ScreenMask
X=0
Y=0
; Reference .screen-visual: no top vignette; mid/bottom for overlays
ScreenTintGradient=90 | 0,0,0,0 ; 0.0 | 0,0,0,51 ; 0.5 | 0,0,0,179 ; 1.0
Shape=Rectangle 0,0,#ScreenWidth#,#ScreenHeight# | Fill LinearGradient ScreenTintGradient | StrokeWidth 0
DynamicVariables=1

[GridOverlay]
Meter=Shape
Container=ScreenMask
X=0
Y=0
Shape=Line 12,0,12,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape2=Line 24,0,24,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape3=Line 36,0,36,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape4=Line 48,0,48,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape5=Line 60,0,60,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape6=Line 72,0,72,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape7=Line 84,0,84,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape8=Line 96,0,96,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape9=Line 108,0,108,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape10=Line 120,0,120,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape11=Line 132,0,132,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape12=Line 144,0,144,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape13=Line 156,0,156,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape14=Line 168,0,168,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape15=Line 180,0,180,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape16=Line 192,0,192,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape17=Line 204,0,204,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape18=Line 216,0,216,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape19=Line 228,0,228,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape20=Line 240,0,240,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape21=Line 252,0,252,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape22=Line 264,0,264,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape23=Line 276,0,276,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape24=Line 288,0,288,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape25=Line 300,0,300,#ScreenHeight# | StrokeWidth 1 | Stroke Color #GridColor#
Shape26=Line 0,12,#ScreenWidth#,12 | StrokeWidth 1 | Stroke Color #GridColor#
Shape27=Line 0,24,#ScreenWidth#,24 | StrokeWidth 1 | Stroke Color #GridColor#
Shape28=Line 0,36,#ScreenWidth#,36 | StrokeWidth 1 | Stroke Color #GridColor#
Shape29=Line 0,48,#ScreenWidth#,48 | StrokeWidth 1 | Stroke Color #GridColor#
Shape30=Line 0,60,#ScreenWidth#,60 | StrokeWidth 1 | Stroke Color #GridColor#
Shape31=Line 0,72,#ScreenWidth#,72 | StrokeWidth 1 | Stroke Color #GridColor#
Shape32=Line 0,84,#ScreenWidth#,84 | StrokeWidth 1 | Stroke Color #GridColor#
Shape33=Line 0,96,#ScreenWidth#,96 | StrokeWidth 1 | Stroke Color #GridColor#
Shape34=Line 0,108,#ScreenWidth#,108 | StrokeWidth 1 | Stroke Color #GridColor#
Shape35=Line 0,120,#ScreenWidth#,120 | StrokeWidth 1 | Stroke Color #GridColor#
Shape36=Line 0,132,#ScreenWidth#,132 | StrokeWidth 1 | Stroke Color #GridColor#
Shape37=Line 0,144,#ScreenWidth#,144 | StrokeWidth 1 | Stroke Color #GridColor#
Shape38=Line 0,156,#ScreenWidth#,156 | StrokeWidth 1 | Stroke Color #GridColor#
Shape39=Line 0,168,#ScreenWidth#,168 | StrokeWidth 1 | Stroke Color #GridColor#
Shape40=Line 0,180,#ScreenWidth#,180 | StrokeWidth 1 | Stroke Color #GridColor#
DynamicVariables=1

[ActiveTitleMeter]
Meter=String
Container=ScreenMask
MeasureName=TitleMeasure
Text=%1
Hidden=([StatusMeasure]=0)
X=((#ElapsedX#-#ScreenX#+#ElapsedMeterW#)+(#ClockX#-#ScreenX#-#ClockMeterW#))/2
Y=#TitleAreaY#
W=((#ClockX#-#ScreenX#-#ClockMeterW#)-(#ElapsedX#-#ScreenX#+#ElapsedMeterW#))
H=#TitleAreaHeight#
StringAlign=CenterCenter
ClipString=1
StringCase=Upper
FontFace=#DisplayFont#
FontSize=11
FontWeight=500
FontColor=#TextColor#
CharacterSpacing=0.8
AntiAlias=1
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure TitleMeasure "OpenPlayer"]
MouseActionCursor=1
ToolTipText=[ArtistMeasure]

[StandbyTitleMeter]
Meter=String
Container=ScreenMask
Text=OPEN PLAYER
Hidden=([StatusMeasure]<>0)
X=((#ElapsedX#-#ScreenX#+#ElapsedMeterW#)+(#ClockX#-#ScreenX#-#ClockMeterW#))/2
Y=#TitleAreaY#
W=((#ClockX#-#ScreenX#-#ClockMeterW#)-(#ElapsedX#-#ScreenX#+#ElapsedMeterW#))
H=#TitleAreaHeight#
StringAlign=CenterCenter
ClipString=1
StringCase=Upper
FontFace=#DisplayFont#
FontSize=11
FontWeight=500
FontColor=#TextColor#
CharacterSpacing=0.8
AntiAlias=1
DynamicVariables=1
LeftMouseUpAction=[!CommandMeasure TitleMeasure "OpenPlayer"]
MouseActionCursor=1

; Single meter: MediaPlayer Position is always one string (avoids dual-meter overlap)
[ElapsedTime]
Meter=String
Text=[PositionMeasure]
X=#ElapsedX#
Y=#InfoY#
W=72
H=20
StringAlign=LeftCenter
FontFace=#DisplayFont#
FontSize=12
FontWeight=400
FontColor=#TextColor#
AntiAlias=1
DynamicVariables=1

[StatusPaused]
Meter=String
Text=PAUSED
Hidden=([StateMeasure]<>2)
X=#ClockX#
Y=#StatusTopY#
W=120
H=20
StringAlign=RightCenter
StringCase=Upper
FontFace=#DisplayFont#
FontSize=9
FontWeight=600
FontColor=#TextColor#
CharacterSpacing=0.5
AntiAlias=1
DynamicVariables=1

[StatusStandby]
Meter=String
Text=STANDBY
Hidden=([StateMeasure]<>0)
X=#ClockX#
Y=#StatusTopY#
W=120
H=20
StringAlign=RightCenter
StringCase=Upper
FontFace=#DisplayFont#
FontSize=9
FontWeight=600
FontColor=#TextColor#
CharacterSpacing=0.5
AntiAlias=1
DynamicVariables=1

[ClockMeter]
Meter=String
MeasureName=ClockMeasure
Text=%1
X=#ClockX#
Y=#InfoY#
W=88
H=20
StringAlign=RightCenter
FontFace=#DisplayFont#
FontSize=12
FontWeight=400
FontColor=#TextColor#
AntiAlias=1
DynamicVariables=1

[ProgressBar]
Meter=Bar
MeasureName=ProgressMeasure
Container=ScreenMask
X=0
Y=(#ScreenHeight#-#ProgressHeight#)
W=#ScreenWidth#
H=#ProgressHeight#
BarOrientation=Horizontal
BarColor=#ProgressFill#
SolidColor=#ProgressBase#
DynamicVariables=1

[Grille]
Meter=Shape
X=#GrilleX#
Y=#GrilleY#
Shape=Rectangle 0,0,#GrilleWidth#,#GrilleHeight#,4,4 | Fill Color #GrilleFill# | StrokeWidth 1 | Stroke Color #GrilleStroke#
DynamicVariables=1

[GrilleDots]
Meter=Image
Container=Grille
ImageName=#@#GrilleTile.png
ImageTint=#GrilleDotTint#
X=0
Y=0
W=#GrilleWidth#
H=#GrilleHeight#
Tile=1
DynamicVariables=1

[PrevButton]
Meter=Shape
X=#Button1X#
Y=#ButtonY#
Shape=Path PrevBtnPath | Fill Color #PrevBtnFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
PrevBtnPath=8.33,0 | LineTo 91.67,0 | ArcTo 100,8.33,8.33,8.33 | LineTo 100,91.67 | ArcTo 91.67,100,8.33,8.33 | LineTo 37.5,100 | ArcTo 0,62.5,37.5,37.5 | LineTo 0,8.33 | ArcTo 8.33,0,8.33,8.33 | ClosePath 1
Shape2=Line 9.38,1.04,90.63,1.04 | StrokeWidth 1 | Stroke Color #PrevEdgeColor#
Shape3=Line 1.04,9.38,1.04,61.46 | StrokeWidth 1 | Stroke Color #PrevSideColor#
Shape4=Line 98.96,9.38,98.96,90.63 | StrokeWidth 1 | Stroke Color #PrevSideColor#
DynamicVariables=1
LeftMouseDownAction=[!SetVariable PrevBtnFill "#ButtonPressedFill#"][!SetVariable PrevIconFill "#IconPressedColor#"][!SetVariable PrevEdgeColor "#ButtonPressedEdge#"][!SetVariable PrevSideColor "#ButtonPressedSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw]
LeftMouseUpAction=[!SetVariable PrevBtnFill "#ButtonFill#"][!SetVariable PrevIconFill "#IconColor#"][!SetVariable PrevEdgeColor "#ButtonHighlightEdge#"][!SetVariable PrevSideColor "#ButtonHighlightSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw][!CommandMeasure TitleMeasure "Previous"]
MouseLeaveAction=[!SetVariable PrevBtnFill "#ButtonFill#"][!SetVariable PrevIconFill "#IconColor#"][!SetVariable PrevEdgeColor "#ButtonHighlightEdge#"][!SetVariable PrevSideColor "#ButtonHighlightSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw]
MouseActionCursor=1

[PlayButton]
Meter=Shape
X=#Button2X#
Y=#ButtonY#
Shape=Path PlayBtnPath | Fill Color #PlayBtnFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
PlayBtnPath=8.33,0 | LineTo 91.67,0 | ArcTo 100,8.33,8.33,8.33 | LineTo 100,91.67 | ArcTo 91.67,100,8.33,8.33 | LineTo 8.33,100 | ArcTo 0,91.67,8.33,8.33 | LineTo 0,8.33 | ArcTo 8.33,0,8.33,8.33 | ClosePath 1
Shape2=Line 9.38,1.04,90.63,1.04 | StrokeWidth 1 | Stroke Color #PlayEdgeColor#
Shape3=Line 1.04,9.38,1.04,90.63 | StrokeWidth 1 | Stroke Color #PlaySideColor#
Shape4=Line 98.96,9.38,98.96,90.63 | StrokeWidth 1 | Stroke Color #PlaySideColor#
DynamicVariables=1
LeftMouseDownAction=[!SetVariable PlayBtnFill "#ButtonPressedFill#"][!SetVariable PlayIconFill "#IconPressedColor#"][!SetVariable PlayEdgeColor "#ButtonPressedEdge#"][!SetVariable PlaySideColor "#ButtonPressedSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
LeftMouseUpAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw][!CommandMeasure TitleMeasure "PlayPause"]
MouseLeaveAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
MouseActionCursor=1

[NextButton]
Meter=Shape
X=#Button3X#
Y=#ButtonY#
Shape=Path NextBtnPath | Fill Color #NextBtnFill# | StrokeWidth 1 | Stroke Color #ButtonStroke#
NextBtnPath=8.33,0 | LineTo 91.67,0 | ArcTo 100,8.33,8.33,8.33 | LineTo 100,62.5 | ArcTo 62.5,100,37.5,37.5 | LineTo 8.33,100 | ArcTo 0,91.67,8.33,8.33 | LineTo 0,8.33 | ArcTo 8.33,0,8.33,8.33 | ClosePath 1
Shape2=Line 9.38,1.04,90.63,1.04 | StrokeWidth 1 | Stroke Color #NextEdgeColor#
Shape3=Line 1.04,9.38,1.04,90.63 | StrokeWidth 1 | Stroke Color #NextSideColor#
Shape4=Line 98.96,9.38,98.96,61.46 | StrokeWidth 1 | Stroke Color #NextSideColor#
DynamicVariables=1
LeftMouseDownAction=[!SetVariable NextBtnFill "#ButtonPressedFill#"][!SetVariable NextIconFill "#IconPressedColor#"][!SetVariable NextEdgeColor "#ButtonPressedEdge#"][!SetVariable NextSideColor "#ButtonPressedSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw]
LeftMouseUpAction=[!SetVariable NextBtnFill "#ButtonFill#"][!SetVariable NextIconFill "#IconColor#"][!SetVariable NextEdgeColor "#ButtonHighlightEdge#"][!SetVariable NextSideColor "#ButtonHighlightSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw][!CommandMeasure TitleMeasure "Next"]
MouseLeaveAction=[!SetVariable NextBtnFill "#ButtonFill#"][!SetVariable NextIconFill "#IconColor#"][!SetVariable NextEdgeColor "#ButtonHighlightEdge#"][!SetVariable NextSideColor "#ButtonHighlightSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw]
MouseActionCursor=1

; Icons: same paths as reference-website (viewBox 0 0 24 24), scaled to #IconSize# (28px)
[PrevIcon]
Meter=Shape
X=(#Button1X#+(#ButtonWidth#-#IconSize#)/2)
Y=(#ButtonY#+(#ButtonHeight#-#IconSize#)/2)
Shape=Rectangle 7,7,2.333,14 | Fill Color #PrevIconFill# | StrokeWidth 0
Shape2=Path PrevTri | Fill Color #PrevIconFill# | StrokeWidth 0
PrevTri=11.083,14 | LineTo 21,21 | LineTo 21,7 | ClosePath 1
DynamicVariables=1
LeftMouseDownAction=[!SetVariable PrevBtnFill "#ButtonPressedFill#"][!SetVariable PrevIconFill "#IconPressedColor#"][!SetVariable PrevEdgeColor "#ButtonPressedEdge#"][!SetVariable PrevSideColor "#ButtonPressedSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw]
LeftMouseUpAction=[!SetVariable PrevBtnFill "#ButtonFill#"][!SetVariable PrevIconFill "#IconColor#"][!SetVariable PrevEdgeColor "#ButtonHighlightEdge#"][!SetVariable PrevSideColor "#ButtonHighlightSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw][!CommandMeasure TitleMeasure "Previous"]
MouseLeaveAction=[!SetVariable PrevBtnFill "#ButtonFill#"][!SetVariable PrevIconFill "#IconColor#"][!SetVariable PrevEdgeColor "#ButtonHighlightEdge#"][!SetVariable PrevSideColor "#ButtonHighlightSide#"][!UpdateMeter PrevButton][!UpdateMeter PrevIcon][!Redraw]
MouseActionCursor=1

[PlayIcon]
Meter=Shape
Hidden=([StateMeasure]=1)
X=(#Button2X#+(#ButtonWidth#-#IconSize#)/2)
Y=(#ButtonY#+(#ButtonHeight#-#IconSize#)/2)
Shape=Path PlayTri | Fill Color #PlayIconFill# | StrokeWidth 0
PlayTri=9.333,5.833 | LineTo 9.333,22.167 | LineTo 22.167,14 | ClosePath 1
DynamicVariables=1
LeftMouseDownAction=[!SetVariable PlayBtnFill "#ButtonPressedFill#"][!SetVariable PlayIconFill "#IconPressedColor#"][!SetVariable PlayEdgeColor "#ButtonPressedEdge#"][!SetVariable PlaySideColor "#ButtonPressedSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
LeftMouseUpAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw][!CommandMeasure TitleMeasure "PlayPause"]
MouseLeaveAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
MouseActionCursor=1

[PauseIcon]
Meter=Shape
Hidden=([StateMeasure]<>1)
X=(#Button2X#+(#ButtonWidth#-#IconSize#)/2)
Y=(#ButtonY#+(#ButtonHeight#-#IconSize#)/2)
Shape=Rectangle 7,5.833,4.667,16.333 | Fill Color #PlayIconFill# | StrokeWidth 0
Shape2=Rectangle 16.333,5.833,4.667,16.333 | Fill Color #PlayIconFill# | StrokeWidth 0
DynamicVariables=1
LeftMouseDownAction=[!SetVariable PlayBtnFill "#ButtonPressedFill#"][!SetVariable PlayIconFill "#IconPressedColor#"][!SetVariable PlayEdgeColor "#ButtonPressedEdge#"][!SetVariable PlaySideColor "#ButtonPressedSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
LeftMouseUpAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw][!CommandMeasure TitleMeasure "PlayPause"]
MouseLeaveAction=[!SetVariable PlayBtnFill "#ButtonFill#"][!SetVariable PlayIconFill "#IconColor#"][!SetVariable PlayEdgeColor "#ButtonHighlightEdge#"][!SetVariable PlaySideColor "#ButtonHighlightSide#"][!UpdateMeter PlayButton][!UpdateMeter PlayIcon][!UpdateMeter PauseIcon][!Redraw]
MouseActionCursor=1

[NextIcon]
Meter=Shape
X=(#Button3X#+(#ButtonWidth#-#IconSize#)/2)
Y=(#ButtonY#+(#ButtonHeight#-#IconSize#)/2)
Shape=Path NextTri | Fill Color #NextIconFill# | StrokeWidth 0
Shape2=Rectangle 18.667,7,2.333,14 | Fill Color #NextIconFill# | StrokeWidth 0
NextTri=7,21 | LineTo 16.917,14 | LineTo 7,7 | ClosePath 1
DynamicVariables=1
LeftMouseDownAction=[!SetVariable NextBtnFill "#ButtonPressedFill#"][!SetVariable NextIconFill "#IconPressedColor#"][!SetVariable NextEdgeColor "#ButtonPressedEdge#"][!SetVariable NextSideColor "#ButtonPressedSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw]
LeftMouseUpAction=[!SetVariable NextBtnFill "#ButtonFill#"][!SetVariable NextIconFill "#IconColor#"][!SetVariable NextEdgeColor "#ButtonHighlightEdge#"][!SetVariable NextSideColor "#ButtonHighlightSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw][!CommandMeasure TitleMeasure "Next"]
MouseLeaveAction=[!SetVariable NextBtnFill "#ButtonFill#"][!SetVariable NextIconFill "#IconColor#"][!SetVariable NextEdgeColor "#ButtonHighlightEdge#"][!SetVariable NextSideColor "#ButtonHighlightSide#"][!UpdateMeter NextButton][!UpdateMeter NextIcon][!Redraw]
MouseActionCursor=1

; Rounded rect mask for GrainOverlay. Container must use opaque Fill — Rainmeter only draws child pixels where the container has solid pixels (transparent fill = nothing visible).
[ShellGrainClip]
Meter=Shape
Shape=Rectangle 0,0,#ShellWidth#,#ShellHeight#,#ShellRadius#,#ShellRadius# | Fill Color 255,255,255,255 | StrokeWidth 0
DynamicVariables=1

; Tiled film grain over the full shell; clicks pass through to controls below
[GrainOverlay]
Meter=Image
Container=ShellGrainClip
ImageName=#@#GrainTile.png
X=0
Y=0
W=#ShellWidth#
H=#ShellHeight#
Tile=1
ImageAlpha=#GrainAlpha#
UpdateDivider=-1
MouseTransparent=1
DynamicVariables=1

[StatusPlayingIcon]
Meter=Shape
Hidden=([StateMeasure]<>1)
X=(#ScreenX#+#ScreenWidth#-#RecordDotInsetX#-#RecordDotSize#)
Y=(#ScreenY#+#RecordDotInsetY#)
Shape=Ellipse 5,5,5,5 | Fill Color 255,59,48,#PlayingDotAlpha# | StrokeWidth 0
DynamicVariables=1
