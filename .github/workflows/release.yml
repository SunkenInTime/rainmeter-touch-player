name: Release Rainmeter Skin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: Which version bump to publish
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $currentVersionLine = (Get-Content "latest.ini" | Where-Object { $_ -match "^VersionLabel=" } | Select-Object -First 1)
            if (-not $currentVersionLine) {
              throw "Could not determine the current version from latest.ini."
            }

            $currentVersion = $currentVersionLine -replace "^VersionLabel=", ""
            $versionParts = $currentVersion.Split(".")
            if ($versionParts.Count -ne 3) {
              throw "Expected semantic version format in latest.ini, got '$currentVersion'."
            }

            $major = [int]$versionParts[0]
            $minor = [int]$versionParts[1]
            $patch = [int]$versionParts[2]
            $releaseType = "${{ github.event.inputs.release_type }}"

            switch ($releaseType) {
              "major" {
                $major += 1
                $minor = 0
                $patch = 0
              }
              "minor" {
                $minor += 1
                $patch = 0
              }
              "patch" {
                $patch += 1
              }
              default {
                throw "Unsupported release type '$releaseType'."
              }
            }

            $releaseVersion = "$major.$minor.$patch"
            $releaseCode = ($major * 10000) + ($minor * 100) + $patch
            $releaseTag = "v$releaseVersion"
            $branchName = "${{ github.ref_name }}"
          }
          else {
            $releaseTag = "${{ github.ref_name }}"
            $releaseVersion = $releaseTag -replace "^v", ""
            $versionParts = $releaseVersion.Split(".")
            if ($versionParts.Count -ne 3) {
              throw "Expected semantic version format in git tag, got '$releaseVersion'."
            }

            $releaseCode = (([int]$versionParts[0]) * 10000) + (([int]$versionParts[1]) * 100) + ([int]$versionParts[2])
          }

          "value=$releaseVersion" >> $env:GITHUB_OUTPUT
          "code=$releaseCode" >> $env:GITHUB_OUTPUT
          "tag=$releaseTag" >> $env:GITHUB_OUTPUT

          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "branch=$branchName" >> $env:GITHUB_OUTPUT
          }
      
      - name: Bump release version files
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $releaseVersion = "${{ steps.version.outputs.value }}"
          $releaseCode = "${{ steps.version.outputs.code }}"

          function Update-FileValue {
            param(
              [string]$Path,
              [string]$Pattern,
              [string]$Replacement
            )

            $content = Get-Content -Path $Path -Raw
            $updated = [regex]::Replace($content, $Pattern, $Replacement)

            if ($content -eq $updated) {
              throw "No changes applied to $Path for pattern $Pattern"
            }

            Set-Content -Path $Path -Value $updated -NoNewline
          }

          Update-FileValue -Path "RetroTouchPlayer/Player.ini" -Pattern "(?m)^Version=.*$" -Replacement "Version=$releaseVersion"
          Update-FileValue -Path "RetroTouchPlayer/@Resources/Variables.inc" -Pattern "(?m)^SkinVersionCode=.*$" -Replacement "SkinVersionCode=$releaseCode"
          Update-FileValue -Path "RetroTouchPlayer/@Resources/Variables.inc" -Pattern "(?m)^SkinVersionLabel=.*$" -Replacement "SkinVersionLabel=$releaseVersion"
          Update-FileValue -Path "latest.ini" -Pattern "(?m)^VersionCode=.*$" -Replacement "VersionCode=$releaseCode"
          Update-FileValue -Path "latest.ini" -Pattern "(?m)^VersionLabel=.*$" -Replacement "VersionLabel=$releaseVersion"
          Update-FileValue -Path "RMSKIN.ini" -Pattern "(?m)^Version=.*$" -Replacement "Version=$releaseVersion"

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $releaseVersion = "${{ steps.version.outputs.value }}"
          $branchName = "${{ steps.version.outputs.branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add RetroTouchPlayer/Player.ini RetroTouchPlayer/@Resources/Variables.inc latest.ini RMSKIN.ini
          git commit -m "Release v$releaseVersion"
          git push origin HEAD:$branchName

      - name: Prepare RMSKIN package layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "build/package/Skins" -Force | Out-Null
          New-Item -ItemType Directory -Path "build/dist" -Force | Out-Null
          Copy-Item -Path "RetroTouchPlayer" -Destination "build/package/Skins/RetroTouchPlayer" -Recurse -Force
          Copy-Item -Path "RMSKIN.ini" -Destination "build/package/RMSKIN.ini" -Force

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $releaseTag = "${{ steps.version.outputs.tag }}"
          git fetch --tags --force

          git ls-remote --exit-code --tags origin "refs/tags/$releaseTag" *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Tag $releaseTag already exists on origin."
          }

          git tag $releaseTag
          git push origin $releaseTag

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build patched rmskin-builder
        shell: pwsh
        run: |
          git clone --depth 1 --branch v2.0.3 https://github.com/2bndy5/rmskin-action.git build/rmskin-builder-src

          $zipModule = "build/rmskin-builder-src/src/file_utils/zip.rs"
          $content = Get-Content -Path $zipModule -Raw
          $updated = $content.Replace("let _ = archive.write(&buf)?;", "archive.write_all(&buf)?;")

          if ($content -eq $updated) {
            throw "Failed to patch rmskin-builder partial write bug."
          }

          Set-Content -Path $zipModule -Value $updated -NoNewline
          cargo install --path build/rmskin-builder-src --root build/rmskin-builder --features bin --locked --force

          if (-not (Test-Path "build/rmskin-builder/bin/rmskin-build")) {
            throw "Expected rmskin-build binary was not installed to build/rmskin-builder/bin/rmskin-build."
          }

      - name: Build .rmskin package
        id: builder
        shell: pwsh
        run: |
          $archiveName = "RetroTouchPlayer_${{ steps.version.outputs.value }}.rmskin"
          & "./build/rmskin-builder/bin/rmskin-build" --path build/package --dir-out build/dist --title RetroTouchPlayer --version "${{ steps.version.outputs.value }}" --author SunkenInTime

          if (-not (Test-Path "build/dist/$archiveName")) {
            throw "Expected archive build/dist/$archiveName was not created."
          }

          "arc_name=$archiveName" >> $env:GITHUB_OUTPUT

      - name: Verify packaged font integrity
        shell: pwsh
        run: |
          $packageFont = "build/package/Skins/RetroTouchPlayer/@Resources/Fonts/CozetteVector.ttf"
          $archivePath = "build/dist/${{ steps.builder.outputs.arc_name }}"

          python -c "import hashlib, sys, zipfile; archive_path, package_font = sys.argv[1:3]; entry_name = 'Skins/RetroTouchPlayer/@Resources/Fonts/CozetteVector.ttf'; packaged_font = open(package_font, 'rb').read(); archive_font = zipfile.ZipFile(archive_path).read(entry_name); packaged_hash = hashlib.sha256(packaged_font).hexdigest(); archive_hash = hashlib.sha256(archive_font).hexdigest(); print(f'packaged source sha256={packaged_hash}'); print(f'archive entry sha256={archive_hash}'); sys.exit(0 if packaged_hash == archive_hash else 1)" $archivePath $packageFont

      - name: Normalize release asset name
        shell: pwsh
        run: |
          Copy-Item -Path "build/dist/${{ steps.builder.outputs.arc_name }}" -Destination "build/dist/RetroTouchPlayer.rmskin" -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/RetroTouchPlayer.rmskin
          generate_release_notes: true
          name: RetroTouchPlayer ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
